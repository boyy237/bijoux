<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion Client - Bijoux Pro</title>
  <link rel="stylesheet" href="site-style.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--dark) 0%, #2c2c2c 100%);
    }
    .login-box {
      background: white;
      padding: 3rem 2rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(212, 175, 55, 0.15);
      max-width: 450px;
      width: 90%;
    }
    .login-box h1 {
      text-align: center;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }
    .login-box p {
      text-align: center;
      color: #666;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.7rem;
      font-weight: 600;
      color: var(--dark);
    }
    .form-group input {
      width: 100%;
      padding: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    .btn-login-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #c9a227);
      color: var(--dark);
      padding: 1rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }
    .btn-login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .tab-btn {
      padding: 0.8rem;
      border: 2px solid var(--border);
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: var(--primary);
      color: var(--dark);
      border-color: var(--primary);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: var(--primary);
      font-weight: 600;
    }
    .signup-link {
      text-align: center;
      margin-top: 1rem;
      color: #666;
    }
    .signup-link a {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>Bijoux Pro</h1>
      <p>Votre espace personnel</p>
      
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Connexion</button>
        <button class="tab-btn" onclick="switchTab('signup')">Inscription</button>
      </div>

      <!-- Login -->
      <div id="login" class="tab-content active">
        <form onsubmit="handleClientLogin(event)">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="votre@email.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-login-submit">Se connecter</button>
        </form>
      </div>

      <!-- Signup -->
      <div id="signup" class="tab-content">
        <form onsubmit="handleClientSignup(event)">
          <div class="form-group">
            <label for="signup-name">Nom complet</label>
            <input type="text" id="signup-name" placeholder="Jean Dupont" required />
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="votre@email.com" required />
          </div>
          <div class="form-group">
            <label for="signup-phone">Téléphone</label>
            <input type="tel" id="signup-phone" placeholder="06 12 34 56 78" />
          </div>
          <div class="form-group">
            <label for="signup-password">Mot de passe</label>
            <input type="password" id="signup-password" placeholder="Min. 6 caractères" required minlength="6" />
          </div>
          <div class="form-group">
            <label for="signup-password-confirm">Confirmer mot de passe</label>
            <input type="password" id="signup-password-confirm" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-login-submit">Créer un compte</button>
        </form>
      </div>

      <div class="back-link">
        <a href="index.html">← Retour à la boutique</a>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    function handleClientLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        sessionStorage.setItem('clientLogged', 'true');
        sessionStorage.setItem('clientId', user.id);
        sessionStorage.setItem('clientEmail', email);
        sessionStorage.setItem('clientName', user.name);
        
        window.location.href = 'client-profile.html';
      } else {
        alert('Email ou mot de passe incorrect!');
      }
    }

    function handleClientSignup(event) {
      event.preventDefault();
      
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const phone = document.getElementById('signup-phone').value;
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value;

      if (password !== passwordConfirm) {
        alert('Les mots de passe ne correspondent pas!');
        return;
      }

      let users = JSON.parse(localStorage.getItem('users') || '[]');
      
      if (users.find(u => u.email === email)) {
        alert('Cet email est déjà utilisé!');
        return;
      }

      const newUser = {
        id: Date.now(),
        name,
        email,
        phone,
        password,
        createdAt: new Date().toLocaleDateString('fr-FR'),
        status: 'Actif'
      };

      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));

      alert('Compte créé avec succès! Vous pouvez maintenant vous connecter.');
      
      // Switch to login tab
      document.getElementById('login-email').value = email;
      switchTab('login');
    }
  </script>
</body>
</html>
