<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion Admin - Bijoux Pro</title>
  <link rel="stylesheet" href="site-style.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--dark) 0%, #2c2c2c 100%);
    }
    .login-box {
      background: white;
      padding: 3rem 2rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(212, 175, 55, 0.15);
      max-width: 400px;
      width: 90%;
    }
    .login-box h1 {
      text-align: center;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }
    .login-box p {
      text-align: center;
      color: #666;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.7rem;
      font-weight: 600;
      color: var(--dark);
    }
    .form-group input {
      width: 100%;
      padding: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .remember-forgot a {
      color: var(--primary);
      font-weight: 600;
    }
    .btn-login-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #c9a227);
      color: var(--dark);
      padding: 1rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }
    .btn-login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: var(--primary);
      font-weight: 600;
    }
    .credentials-info {
      background: rgba(212, 175, 55, 0.1);
      padding: 1.5rem;
      border-radius: 10px;
      margin-top: 2rem;
      border-left: 4px solid var(--primary);
    }
    .credentials-info h4 {
      color: var(--primary);
      margin-bottom: 0.8rem;
    }
    .credentials-info p {
      margin: 0.5rem 0;
      text-align: left;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>Espace Admin</h1>
      <p>Gérez votre boutique et vos réservations</p>
      
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@bijoux.pro" required />
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div class="remember-forgot">
          <label style="font-weight: 500; display: flex; gap: 0.5rem;">
            <input type="checkbox" name="remember" />
            Se souvenir de moi
          </label>
          <a href="#forgot">Mot de passe oublié?</a>
        </div>
        <button type="submit" class="btn-login-submit">Se connecter</button>
      </form>

      <div class="credentials-info">
        <h4>🔐 Identifiants de test</h4>
        <p><strong>Email:</strong> admin@bijoux.pro</p>
        <p><strong>Mot de passe:</strong> admin123</p>
        <p style="margin-top: 1rem; font-style: italic; color: #999;">Les identifiants de test vous permettent d'accéder au dashboard complet.</p>
      </div>

      <div class="back-link">
        <a href="index.html">← Retour à la boutique</a>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Simple validation pour démo
      if (email === 'admin@bijoux.pro' && password === 'admin123') {
        // Save session
        sessionStorage.setItem('adminLogged', 'true');
        sessionStorage.setItem('adminEmail', email);
        
        // Redirect to dashboard
        window.location.href = 'bijoux.html';
      } else {
        alert('Email ou mot de passe incorrect!');
      }
    }
  </script>
</body>
</html>
